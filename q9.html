<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz - Pergunta 9</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <section class="question-page">
        <div class="quiz-container">
            <span class="question-number">❤️ Pergunta 9 de 10</span>
            <div class="progress">
                <div class="progress-fill" style="width:90%"></div>
            </div>
            <h1>De um momento de tristeza, algo mais forte pode se levantar!</h1>
            <p class="intro">Tem momentos ruins que surgem para nos tornar mais fortes...</p>
            <h2 class="question">Que acontecimento nos separou e ao mesmo tempo nos uniu de uma forma única?</h2>
            <div class="answers">
                <button class="answer-card" data-correct="false" data-message="Também! kkkk, mas não foi esse momento">😨 Quando você desmaiou</button>
                <button class="answer-card" data-correct="true">✨ Quando terminamos, mas voltamos muito mais fortes e unidos</button>
                <button class="answer-card" data-correct="false" data-message="Eu sei que é meio triste lembrar desse dia, mas ele foi necessário no fim das contas">🙄 Não teve nenhum momento ruim entre nós</button>
            </div>
            <div class="feedback-message"></div>
        </div>
    </section>
    <script src="script.js"></script>
</body>

</html>
