<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz - Pergunta 2</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <section class="question-page">
        <div class="quiz-container">
            <span class="question-number">❤️ Pergunta 2 de 10</span>
            <div class="progress">
                <div class="progress-fill" style="width:20%"></div>
            </div>
            <h1>Para onde será que caminhamos depois?</h1>
            <p class="intro">O que será que fizemos juntos pela primeira vez...</p>
            <h2 class="question">O que fizemos juntos em um dos primeiros dias na faculdade? 🤔</h2>
            <div class="answers">
                <button class="answer-card" data-correct="false" data-message="Talvez, mas será mesmo?">🤨 Não fizemos nada nos primeiros dias</button>
                <button class="answer-card" data-correct="false" data-message="Acho que não é isso, tente se lembrar...">🍦 Saímos pra tomar um sorvete</button>
                <button class="answer-card" data-correct="true">🚍 Fomos juntos pegar ônibus (e você ficou correndo na minha frente)</button>
                <button class="answer-card" data-correct="false" data-message="Talvez tenha sido, não tenho certeza">📚 Ficamos na biblioteca adiantando os estudos</button>
            </div>
            <div class="feedback-message"></div>
        </div>
    </section>
    <script src="script.js"></script>
</body>

</html>
