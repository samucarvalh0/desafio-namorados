<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio dos Namorados</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400;500;600&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body>
    <section class="countdown reveal">
        <h2>O quiz começa em:</h2>
        <p class="subtitle">Clique em confirmar para iniciar a contagem.</p>

        <div class="timer hidden">
            <div>
                <span id="seconds">10</span>
                <p>Segundos</p>
            </div>
        </div>

        <button id="start-quiz" class="btn large">Confirmar início</button>
    </section>

    <script src="script.js"></script>
</body>

</html>
