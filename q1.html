<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz - Pergunta 1</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <section class="question-page">

        <div class="quiz-container">

            <span class="question-number">
                ❤️ Pergunta 1 de 10
            </span>

            <div class="progress">
                <div class="progress-fill"></div>
            </div>

            <h1>
                Vamos começar pelo início...
            </h1>

            <p class="intro">
                Toda grande história tem um começo.
                Existe um lugar que nossos caminhos se cruzaram.
            </p>

            <h2 class="question">
                Onde foi que nos vimos pela primeira vez? 🧐
            </h2>

            <div class="answers">

                <button class="answer-card" data-correct="false" data-message="Acho que não é isso, tente se lembrar...">
                    📍 No Shopping
                </button>

                <button class="answer-card" data-correct="false" data-message="Não me lembro de ter sido nesse lugar">
                    📍 No ônibus
                </button>

                <button class="answer-card" data-correct="true">
                    📍 Na Faculdade
                </button>

                <button class="answer-card" data-correct="false" data-message="Talvez tenha sido, não tenho certeza">
                    📍 Na Rua
                </button>

            </div>

            <div class="feedback-message"></div>

        </div>

    </section>

    <script src="script.js"></script>
</body>

</html>
