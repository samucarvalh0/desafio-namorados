<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz - Pergunta 4</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <section class="question-page">
        <div class="quiz-container">
            <span class="question-number">❤️ Pergunta 4 de 10</span>
            <div class="progress">
                <div class="progress-fill" style="width:40%"></div>
            </div>
            <h1>Como será que ficamos mais próximos?</h1>
            <p class="intro">A partir desse momento, as coisas ficaram mais interessantes...</p>
            <h2 class="question">O que aconteceu que fez com que ficássemos mais presentes na rotina um do outro?</h2>
            <div class="answers">
                <button class="answer-card" data-correct="true">🍝 Almoços junto com a Lari</button>
                <button class="answer-card" data-correct="false" data-message="Não me lembro de ter sido isso">👥 Começamos a fazer um trabalho em dupla</button>
                <button class="answer-card" data-correct="false" data-message="Acho que isso não aconteceu">🏠 Viramos vizinhos</button>
                <button class="answer-card" data-correct="true">🧮 Começamos a trabalhar juntos no LEM</button>
            </div>
            <div class="feedback-message"></div>
        </div>
    </section>
    <script src="script.js"></script>
</body>

</html>
