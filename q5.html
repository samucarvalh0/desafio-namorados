<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz - Pergunta 5</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <section class="question-page">
        <div class="quiz-container">
            <span class="question-number">❤️ Pergunta 5 de 10</span>
            <div class="progress">
                <div class="progress-fill" style="width:50%"></div>
            </div>
            <h1><strong>PERGUNTA ESPECIAL</strong></h1>
            <p class="intro">Neste momento eu já estava me apaixonando por você, consegue descobrir qual?</p>
            <h2 class="question">Neste dia, eu só pensava em ficar próximo de você e trabalhar junto de você.</h2>
            <div class="answers">
                <button class="answer-card" data-correct="false" data-message="Acho que não é isso, tente se lembrar...">🍛Almoço juntos</button>
                <button class="answer-card" data-correct="false" data-message="Talvez tenha sido, não tenho certeza">👩‍🏫 Apresentação de trabalho</button>
                <button class="answer-card" data-correct="false" data-message="Não me lembro de ter sido isso">🧮 Trabalho no LEM</button>
                <button class="answer-card" data-correct="true">🏫 Trabalho extensivo no Pedro Mazzo</button>
            </div>
            <div class="feedback-message"></div>
        </div>
    </section>
    <script src="script.js"></script>
</body>

</html>
