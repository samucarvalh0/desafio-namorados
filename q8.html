<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz - Pergunta 8</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <section class="question-page">
        <div class="quiz-container">
            <span class="question-number">❤️ Pergunta 8 de 10</span>
            <div class="progress">
                <div class="progress-fill" style="width:80%"></div>
            </div>
            <h1>Agora estamos em um bom lugar</h1>
            <p class="intro">Aqui nossas vidas se entrelaçaram de vez</p>
            <h2 class="question">O que fizemos na primeira noite no colóquio?</h2>
            <div class="answers">
                <button class="answer-card" data-correct="false" data-message="Poderia ter sido... Se eu tivesse tido mais coragem 😭">🌹 Fomos a um jantar romântico</button>
                <button class="answer-card" data-correct="false" data-message="Tenho certeza que não fiz isso">😡 Você me deu um fora</button>
                <button class="answer-card" data-correct="false" data-message="Será mesmo?">⬛ Nada.</button>
                <button class="answer-card" data-correct="true">🌹 Viramos a noite juntos conversando (e foi incrível)</button>
            </div>
            <div class="feedback-message"></div>
        </div>
    </section>
    <script src="script.js"></script>
</body>

</html>
