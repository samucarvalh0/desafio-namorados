<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz - Pergunta 10</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <section class="question-page" id="q10-page">
        <div class="quiz-container">
            <span class="question-number">❤️ Pergunta 10 de 10</span>
            <div class="progress">
                <div class="progress-fill" style="width:100%"></div>
            </div>
            <h1>Já está na hora de fechar o quiz</h1>
            <p class="intro">Que tal finalizarmos e aproveitarmos esse dia especial.</p>
            <h2 class="question">Você me ama?</h2>
            <div class="answers">
                <button class="answer-card" data-correct="false" data-message="como assim?">Não</button>
                <button class="answer-card" data-correct="true">💞 Sim!</button>
            </div>
            <div class="feedback-message"></div>
        </div>
    </section>
    <script src="script.js"></script>
</body>

</html>
