<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz - Pergunta 6</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <section class="question-page">
        <div class="quiz-container">
            <span class="question-number">❤️ Pergunta 6 de 10</span>
            <div class="progress">
                <div class="progress-fill" style="width:60%"></div>
            </div>
            <h1>Já me dediquei para você, sem que soubesse...</h1>
            <p class="intro">Eu me dediquei muito para ser bom para você, e esse era meu objetivo</p>
            <h2 class="question">Em que momento você acha que me dediquei pra você?</h2>
            <div class="answers">
                <button class="answer-card" data-correct="true">🎻 Festival de Música</button>
                <button class="answer-card" data-correct="false" data-message="Não me lembro de ter sido isso">🤵 Apresentação de PCC</button>
                <button class="answer-card" data-correct="false" data-message="Acho que não é isso, tente se lembrar...">🌐 Criação do site LEM</button>
                <button class="answer-card" data-correct="false" data-message="Talvez tenha sido, não tenho certeza">👨‍🏫 Aulas de reforço para o Ensino Médio</button>
            </div>
            <div class="feedback-message"></div>
        </div>
    </section>
    <script src="script.js"></script>
</body>

</html>
