<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz - Pergunta 7</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <section class="question-page">
        <div class="quiz-container">
            <span class="question-number">❤️ Pergunta 7 de 10</span>
            <div class="progress">
                <div class="progress-fill" style="width:70%"></div>
            </div>
            <h1>Agora a coisa ficou séria</h1>
            <p class="intro">Essa questão deve ser respondia com seriedade</p>
            <h2 class="question">Acha mesmo que era frio?</h2>
            <div class="answers">
                <button class="answer-card" data-correct="true"> Claro que não era frio</button>
            </div>
            <div class="feedback-message"></div>
        </div>
    </section>
    <script src="script.js"></script>
</body>

</html>
